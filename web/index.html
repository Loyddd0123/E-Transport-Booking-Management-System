<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Transport Login</title>

  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="login-page">

  <div class="login-overlay"></div>

  <div class="login-box">
    <div class="brand">
      <div class="brand-icon">🚌</div>
      <h2>E-Transport</h2>
    </div>

    <h1>Welcome Back</h1>
    <p class="subtitle">Book and manage your trips easily</p>

    <div class="input-box">
      <span>✉</span>
      <input type="email" id="email" value="passenger@etransport.local" placeholder="Email address">
    </div>

    <div class="input-box">
      <span>🔒</span>
      <input type="password" id="password" value="password" placeholder="Password">
    </div>

    <button onclick="login()" class="login-btn">Login</button>
    <button onclick="showRegister()" class="signup-btn">Create an account</button>

    <p class="bottom-text">
      Sample password: <b>password</b>
    </p>
  </div>

  <div id="registerBox" class="register-box" style="display:none;">
  <h2>Create Account</h2>

  <div class="input-box">
    <span>👤</span>
    <input type="text" id="regName" placeholder="Full Name">
  </div>

  <div class="input-box">
    <span>✉</span>
    <input type="email" id="regEmail" placeholder="Email address">
  </div>

  <div class="input-box">
    <span>🔒</span>
    <input type="password" id="regPassword" placeholder="Password">
  </div>

  <button onclick="register()" class="login-btn">Sign Up</button>
  <button onclick="showLogin()" class="signup-btn">Back to Login</button>
</div>

  <script src="assets/js/app.js"></script>
</body>
</html>
